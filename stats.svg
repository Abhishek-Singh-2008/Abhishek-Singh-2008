<svg width="480" height="260" viewBox="0 0 480 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="cardClip"><rect x="0" y="0" width="480" height="260" rx="18"/></clipPath>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050914"/><stop offset="100%" stop-color="#0d1e3f"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22e8ff"/><stop offset="60%" stop-color="#3b82ff"/><stop offset="100%" stop-color="#8b6bff"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4"/></filter>
    <style>
      text { user-select:none; }
      @keyframes pulse { 0%,100%{opacity:0.35} 50%{opacity:0.7} }
      .ring-glow { animation: pulse 2.6s ease-in-out infinite; }
    </style>
  </defs>
  <g clip-path="url(#cardClip)">
    <rect x="0" y="0" width="480" height="260" fill="url(#bgGrad)"/>
    <g stroke="rgba(56,217,255,0.35)" stroke-width="0.5" opacity="0.15">
      <line x1="0" y1="0" x2="0" y2="260"/><line x1="40" y1="0" x2="40" y2="260"/><line x1="80" y1="0" x2="80" y2="260"/><line x1="120" y1="0" x2="120" y2="260"/><line x1="160" y1="0" x2="160" y2="260"/><line x1="200" y1="0" x2="200" y2="260"/><line x1="240" y1="0" x2="240" y2="260"/><line x1="280" y1="0" x2="280" y2="260"/><line x1="320" y1="0" x2="320" y2="260"/><line x1="360" y1="0" x2="360" y2="260"/><line x1="400" y1="0" x2="400" y2="260"/><line x1="440" y1="0" x2="440" y2="260"/><line x1="480" y1="0" x2="480" y2="260"/>
      <line x1="0" y1="0" x2="480" y2="0"/><line x1="0" y1="40" x2="480" y2="40"/><line x1="0" y1="80" x2="480" y2="80"/><line x1="0" y1="120" x2="480" y2="120"/><line x1="0" y1="160" x2="480" y2="160"/><line x1="0" y1="200" x2="480" y2="200"/><line x1="0" y1="240" x2="480" y2="240"/>
    </g>

    <text x="24" y="30" font-family="'Poppins',sans-serif" font-size="14" font-weight="700" fill="#eaf3ff">GitHub Stats</text>
    <text x="456" y="30" text-anchor="end" font-family="monospace" font-size="10" fill="#8ea3c9">@Abhishek-Singh-2008</text>

    <g transform="translate(100,150)">
      <circle r="74" fill="none" stroke="rgba(10,22,48,0.55)" stroke-width="12"/>
      <circle r="74" fill="none" stroke="#22e8ff" stroke-width="14" opacity="0.35" filter="url(#glow)" class="ring-glow"/>
      <circle r="74" fill="none" stroke="url(#ringGrad)" stroke-width="12" stroke-linecap="round"
        transform="rotate(-90)" stroke-dasharray="0 465.0">
        <animate attributeName="stroke-dasharray" from="0 465.0" to="399.9 465.0"
          begin="0.3s" dur="1.6s" fill="freeze" calcMode="spline" keySplines="0.16 0.84 0.2 1"/>
      </circle>
      <text x="0" y="-2" text-anchor="middle" font-family="'Poppins',sans-serif" font-size="30" font-weight="800" fill="#eaf3ff" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.6s" fill="freeze"/>
        A+
      </text>
      <text x="0" y="20" text-anchor="middle" font-family="monospace" font-size="10" fill="#8ea3c9" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.6s" fill="freeze"/>
        RANK
      </text>
    </g>

    
    <g transform="translate(210,46)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.50s" dur="0.5s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" additive="sum" from="-34 0" to="0 0"
        begin="0.50s" dur="0.55s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      <circle cx="8" cy="-5" r="12" fill="rgba(10,22,48,0.55)" stroke="#22e8ff" stroke-width="1"/>
      <text x="8" y="-1" text-anchor="middle" font-family="monospace" font-size="12" fill="#22e8ff">★</text>
      <text x="28" y="-1" font-family="'Poppins',sans-serif" font-size="12.5" fill="#8ea3c9">Total Stars</text>
      <text x="248" y="-1" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="15" font-weight="700" fill="#eaf3ff">42</text>
    </g>
    <g transform="translate(210,84)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.66s" dur="0.5s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" additive="sum" from="-34 0" to="0 0"
        begin="0.66s" dur="0.55s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      <circle cx="8" cy="-5" r="12" fill="rgba(10,22,48,0.55)" stroke="#22e8ff" stroke-width="1"/>
      <text x="8" y="-1" text-anchor="middle" font-family="monospace" font-size="12" fill="#22e8ff">⌘</text>
      <text x="28" y="-1" font-family="'Poppins',sans-serif" font-size="12.5" fill="#8ea3c9">Commits (last yr)</text>
      <text x="248" y="-1" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="15" font-weight="700" fill="#eaf3ff">860</text>
    </g>
    <g transform="translate(210,122)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.82s" dur="0.5s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" additive="sum" from="-34 0" to="0 0"
        begin="0.82s" dur="0.55s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      <circle cx="8" cy="-5" r="12" fill="rgba(10,22,48,0.55)" stroke="#22e8ff" stroke-width="1"/>
      <text x="8" y="-1" text-anchor="middle" font-family="monospace" font-size="12" fill="#22e8ff">⇉</text>
      <text x="28" y="-1" font-family="'Poppins',sans-serif" font-size="12.5" fill="#8ea3c9">Pull Requests</text>
      <text x="248" y="-1" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="15" font-weight="700" fill="#eaf3ff">18</text>
    </g>
    <g transform="translate(210,160)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.98s" dur="0.5s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" additive="sum" from="-34 0" to="0 0"
        begin="0.98s" dur="0.55s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      <circle cx="8" cy="-5" r="12" fill="rgba(10,22,48,0.55)" stroke="#22e8ff" stroke-width="1"/>
      <text x="8" y="-1" text-anchor="middle" font-family="monospace" font-size="12" fill="#22e8ff">◉</text>
      <text x="28" y="-1" font-family="'Poppins',sans-serif" font-size="12.5" fill="#8ea3c9">Issues Opened</text>
      <text x="248" y="-1" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="15" font-weight="700" fill="#eaf3ff">9</text>
    </g>
    <g transform="translate(210,198)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.14s" dur="0.5s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" additive="sum" from="-34 0" to="0 0"
        begin="1.14s" dur="0.55s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      <circle cx="8" cy="-5" r="12" fill="rgba(10,22,48,0.55)" stroke="#22e8ff" stroke-width="1"/>
      <text x="8" y="-1" text-anchor="middle" font-family="monospace" font-size="12" fill="#22e8ff">⌘</text>
      <text x="28" y="-1" font-family="'Poppins',sans-serif" font-size="12.5" fill="#8ea3c9">Repos Contributed</text>
      <text x="248" y="-1" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="15" font-weight="700" fill="#eaf3ff">5</text>
    </g>

    <rect x="0.5" y="0.5" width="479" height="259" rx="17.5" fill="none" stroke="rgba(56,217,255,0.35)" stroke-width="1.2"/>
  </g>
</svg>